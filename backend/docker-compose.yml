services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: tinylink
      POSTGRES_PASSWORD: tinylink
      POSTGRES_DB: tinylink
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U tinylink']
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    command: sh -c "npx prisma migrate deploy && node dist/main.api.js"
    environment:
      ROLE: api
      PORT: 3000
      SHORT_URL_BASE: http://localhost:3000
      DATABASE_URL: postgresql://tinylink:tinylink@postgres:5432/tinylink?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: change-me-in-prod-please-32-chars-min
      JWT_EXPIRES_IN: 3600
    ports:
      - '3000:3000'
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  worker:
    build: .
    command: node dist/main.worker.js
    environment:
      ROLE: worker
      # ConfigService validates the whole env at boot, so the worker needs every
      # required key even though SHORT_URL_BASE is only used by the API.
      SHORT_URL_BASE: http://localhost:3000
      DATABASE_URL: postgresql://tinylink:tinylink@postgres:5432/tinylink?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: change-me-in-prod-please-32-chars-min
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
